# ============================================================================
# IU NWEO AI — Docker Compose (Development Stack)
# Maintainer: Ops (Infrastructure Lead)
# ============================================================================
# Usage:
#   docker compose up -d              → Start all services
#   docker compose up -d postgres neo4j chroma  → Start databases only
#   docker compose logs -f backend    → Tail backend logs
#   docker compose down -v            → Tear down everything including volumes
# ============================================================================

services:
  # --------------------------------------------------------------------------
  # PostgreSQL — LangGraph Checkpointer + User Profiles
  # Architect's spec: postgresql://iu_user:iu_password@postgres:5432/iu_langgraph
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: iu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: iu_user
      POSTGRES_PASSWORD: iu_password
      POSTGRES_DB: iu_langgraph
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U iu_user -d iu_langgraph" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - iu-network

  # --------------------------------------------------------------------------
  # Neo4j — Knowledge Graph (GraphRAG)
  # Browser UI: http://localhost:7474  |  Bolt: bolt://localhost:7687
  # --------------------------------------------------------------------------
  neo4j:
    image: neo4j:5-community
    container_name: iu-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/iu_neo4j_pass
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
    ports:
      - "7474:7474" # Browser UI
      - "7687:7687" # Bolt protocol
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: [ "CMD-SHELL", "cypher-shell -u neo4j -p iu_neo4j_pass 'RETURN 1' || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - iu-network

  # --------------------------------------------------------------------------
  # ChromaDB — Vector Store (Semantic Search)
  # API: http://localhost:8000
  # --------------------------------------------------------------------------
  chroma:
    image: chromadb/chroma:latest
    container_name: iu-chroma
    restart: unless-stopped
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
      CHROMA_SERVER_AUTHN_PROVIDER: ""
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - iu-network

  # --------------------------------------------------------------------------
  # FastAPI Backend — AI Orchestration Engine
  # API: http://localhost:8080
  # --------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iu-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Override for Docker networking (service names, not localhost)
      DATABASE_URL: postgresql://iu_user:iu_password@postgres:5432/iu_langgraph
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: iu_neo4j_pass
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app # Hot-reload in dev
      - backend_cache:/app/.cache
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      chroma:
        condition: service_started
    networks:
      - iu-network

  # --------------------------------------------------------------------------
  # Next.js Frontend — Chat UI
  # UI: http://localhost:3000
  # --------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: iu-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      # Internal Docker network URL for SSR API calls
      API_URL_INTERNAL: http://backend:8080
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src # Hot-reload in dev
    depends_on:
      - backend
    networks:
      - iu-network

# ============================================================================
# Persistent Volumes
# ============================================================================
volumes:
  postgres_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  chroma_data:
    driver: local
  backend_cache:
    driver: local

# ============================================================================
# Network — All services communicate on this bridge
# ============================================================================
networks:
  iu-network:
    driver: bridge
    name: iu-nweo-network
